name: PR Review Fix Scheduler

on:
  schedule:
    - cron: "7 */1 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Print actions without dispatching autofix
        required: false
        default: false
        type: boolean
      max_prs:
        description: Maximum open PRs to inspect
        required: false
        default: "50"
        type: string
      max_dispatches:
        description: Maximum autofix runs to dispatch
        required: false
        default: "1"
        type: string

concurrency:
  group: pr-review-fix-scheduler-${{ github.repository }}
  cancel-in-progress: false

jobs:
  queue:
    uses: ContextualWisdomLab/.github/.github/workflows/pr-review-fix-scheduler.yml@main
    permissions:
      actions: write
      contents: read
      issues: write
      pull-requests: read
      statuses: read
    with:
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
      max_prs: ${{ github.event_name == 'workflow_dispatch' && inputs.max_prs || '50' }}
      max_dispatches: ${{ github.event_name == 'workflow_dispatch' && inputs.max_dispatches || '1' }}
