name: codeql-sast-backfill

# Verification evidence:
# - docs/security/codeql-sast-backfill.md explains the reviewed operational
#   contract and manual dispatch procedure.
# - scripts/ci/validate_codeql_backfill.py performs static checks for the
#   workflow inputs, write permissions, and language matrix.
on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch whose recent commits should receive CodeQL analyses"
        required: true
        default: "main"
      commit_count:
        description: "Number of recent commits to backfill"
        required: true
        default: "30"

permissions:
  contents: read

jobs:
  enumerate:
    name: Enumerate commits
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      commits: ${{ steps.commits.outputs.commits }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Enumerate target commits
        id: commits
        shell: bash
        run: |
          set -euo pipefail

          count="${{ inputs.commit_count }}"
          branch="${{ inputs.branch }}"

          if ! [[ "${count}" =~ ^[0-9]+$ ]]; then
            echo "commit_count must be a positive integer" >&2
            exit 1
          fi

          if (( count < 1 || count > 127 )); then
            echo "commit_count must be between 1 and 127 to stay within the GitHub Actions workflow job limit" >&2
            exit 1
          fi

          git fetch --no-tags --prune origin "${branch}"
          git rev-list --max-count="${count}" "origin/${branch}" \
            | jq -R -s -c 'split("\n")[:-1]' \
            | sed 's/^/commits=/' >> "${GITHUB_OUTPUT}"

  analyze:
    name: Analyze ${{ matrix.language }} at ${{ matrix.commit }}
    needs: enumerate
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        commit: ${{ fromJson(needs.enumerate.outputs.commits) }}
        language: ["javascript-typescript", "python"]
    steps:
      - name: Checkout target commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ matrix.commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}/backfill"
          ref: "refs/heads/${{ inputs.branch }}"
          sha: ${{ matrix.commit }}
