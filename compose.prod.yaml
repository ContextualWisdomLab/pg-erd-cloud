services:
  traefik:
    image: traefik:v3.5.4@sha256:4df0a50fcf71b454c0d7ad17675776dc8d37359deae3291895bdaa008c1b9972
    container_name: erd_traefik
    command:
      - --global.checknewversion=false
      - --global.sendanonymoususage=false
      - --entryPoints.web.address=:8080
      - --providers.file.filename=/etc/traefik/dynamic.yaml
      - --providers.file.watch=true
      - --accesslog=true
      - --log.level=INFO
    depends_on:
      - backend
      - frontend
    ports:
      - "127.0.0.1:${TRAEFIK_HTTP_PORT:-8080}:8080"
    volumes:
      - ./deploy/traefik/dynamic.yaml:/etc/traefik/dynamic.yaml:ro
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine@sha256:4327b9fd295502f326f44153a1045a7170ddbfffed1c3829798328556cfd09e2
    container_name: erd_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-erd}
      POSTGRES_USER: ${POSTGRES_USER:-erd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-54321}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h 127.0.0.1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erd_backend
    env_file: ./.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-erd}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-erd}
      APP_ENV: production
      CORS_ORIGINS: ${CORS_ORIGINS:?set CORS_ORIGINS in .env for production}
      APP_SECRET_FILE: /run/secrets/app_secret
    secrets:
      - app_secret
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    command: >
      sh -lc "
      alembic upgrade head &&
      exec hypercorn --config python:app.hypercorn_config app.main:app --bind 0.0.0.0:8000 --access-logfile - --error-logfile -
      "
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: erd_frontend
    depends_on:
      - backend
    expose:
      - "8080"
    restart: unless-stopped

volumes:
  pgdata:

secrets:
  app_secret:
    file: ./secrets/app_secret
