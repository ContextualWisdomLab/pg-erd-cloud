http:
  routers:
    healthz:
      rule: Path(`/healthz`)
      entryPoints:
        - web
      service: backend
      priority: 110
      middlewares:
        - security-headers

    api:
      rule: PathPrefix(`/api`)
      entryPoints:
        - web
      service: backend
      priority: 100
      middlewares:
        - security-headers

    frontend:
      rule: PathPrefix(`/`)
      entryPoints:
        - web
      service: frontend
      priority: 1
      middlewares:
        - security-headers

  services:
    backend:
      loadBalancer:
        servers:
          - url: http://backend:8000

    frontend:
      loadBalancer:
        servers:
          - url: http://frontend:8080

  middlewares:
    security-headers:
      headers:
        contentTypeNosniff: true
        customFrameOptionsValue: DENY
        referrerPolicy: no-referrer
        permissionsPolicy: geolocation=(), microphone=(), camera=()
