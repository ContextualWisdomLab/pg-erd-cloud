server {
  listen 8080;

  # Response security headers (best-effort). In production, prefer setting these
  # at your ingress/reverse-proxy.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # SPA: serve index.html for client-side routes
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }

  # Proxy API to backend
  location /api/ {
    proxy_pass http://backend:8000/api/;
    include /etc/nginx/conf.d/proxy-headers.conf;
  }

  # Azure VMSS Application Health Extension can probe this endpoint.
  # Keep it un-authenticated and lightweight.
  location = /healthz {
    proxy_pass http://backend:8000/healthz;
    include /etc/nginx/conf.d/proxy-headers.conf;
  }
}
